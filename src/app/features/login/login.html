<header class="header">
  <div class="header-top-gold">
    <img class="brand-logo" src="assets/img/hidalgo.png" alt="Hidalgo Educación" />
    <h1 class="header-title">Sistema de Nómina</h1>
  </div>
  
  <div class="header-sub-maroon">
    <span class="entity-name"></span>
  </div>
</header>

<main class="main-body-white">
  <form #f="ngForm" (ngSubmit)="login(f)" novalidate>
    <mat-card class="card" appearance="outlined">
      
      <label class="field-title" for="usuario">Usuario:</label>
      <mat-form-field appearance="outline" class="login-field with-separator">
        <mat-icon matPrefix>person</mat-icon>
        <input 
          matInput 
          id="usuario" 
          name="user" 
          placeholder="Ingresar usuario" 
          [(ngModel)]="credentials.user" 
          required />
        <mat-error *ngIf="f.submitted || (f.controls['user']?.invalid && f.controls['user']?.touched)">
          Por favor ingrese su usuario.
        </mat-error>
      </mat-form-field>

      <label class="field-title" for="password">Contraseña:</label>
        <mat-form-field appearance="outline" class="login-field with-separator" floatLabel="always">
          <mat-icon matPrefix>lock</mat-icon>
          <input 
              matInput id="password" 
              name="password" 
              placeholder="Ingresar contraseña" 
              [type]="hide ? 'password' : 'text'"
              [(ngModel)]="credentials.password" required />
          <button 
            mat-icon-button 
            matSuffix type="button" 
            (click)="hide = !hide" 
            (mousedown)="$event.preventDefault()"
            [attr.aria-label]="hide ? 'Mostrar contraseña' : 'Ocultar contraseña'"
            [attr.title]="hide ? 'Mostrar contraseña' : 'Ocultar contraseña'">
              <mat-icon>{{ hide ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
          <mat-error *ngIf="f.submitted || (f.controls['password']?.invalid && f.controls['password']?.touched)">
            Por favor ingrese su contraseña.
          </mat-error>
        </mat-form-field>


      <div class="login-button">
        <button mat-raised-button type="submit" [disabled]="loading">
          {{ loading ? 'Accesando...' : 'Acceder' }}
        </button>
      </div>

      <div class="aux-links">
        <a routerLink="/recuperar-contraseña">¿Olvidaste tu contraseña?</a>
      </div>
    </mat-card>
  </form>
</main>

<footer class="footer-maroon">
    <div class="footer-text">DIRECCIÓN GENERAL DE RECURSOS HUMANOS</div>
    <div class="footer-subtext">DIRECCIÓN DE NÓMINA Y CONTROL DE PLAZAS</div>
</footer>
